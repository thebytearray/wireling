name: Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Maven Central secrets
        run: |
          ok=true
          if [ -z "$MAVEN_CENTRAL_USERNAME" ]; then echo "::error::Repository secret MAVEN_CENTRAL_USERNAME is not set"; ok=false; fi
          if [ -z "$MAVEN_CENTRAL_PASSWORD" ]; then echo "::error::Repository secret MAVEN_CENTRAL_PASSWORD is not set"; ok=false; fi
          if [ -z "$MAVEN_CENTRAL_GPG_KEY" ]; then echo "::error::Repository secret MAVEN_CENTRAL_GPG_KEY is not set"; ok=false; fi
          if [ "$ok" != true ]; then exit 1; fi
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_CENTRAL_GPG_KEY: ${{ secrets.MAVEN_CENTRAL_GPG_KEY }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Get current version
        id: current_version
        run: |
          VERSION_NAME=$(grep "VERSION_NAME" version.properties | cut -d'=' -f2)
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION_NAME"

      - name: Calculate new version
        id: new_version
        run: |
          CURRENT_VERSION="${{ steps.current_version.outputs.version_name }}"
          BUMP_TYPE="${{ github.event.inputs.version_bump }}"
          
          IFS='.' read -ra VERSION_PARTS <<< "$CURRENT_VERSION"
          MAJOR=${VERSION_PARTS[0]}
          MINOR=${VERSION_PARTS[1]}
          PATCH=${VERSION_PARTS[2]}
          
          case $BUMP_TYPE in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac
          
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Update version.properties
        run: |
          echo "VERSION_NAME=${{ steps.new_version.outputs.new_version }}" > version.properties
          cat version.properties

      - name: Build library AAR
        run: ./gradlew :wireling:assembleRelease

      - name: Publish to Maven Central (Sonatype)
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_CENTRAL_GPG_KEY: ${{ secrets.MAVEN_CENTRAL_GPG_KEY }}
          MAVEN_CENTRAL_GPG_PASSWORD: ${{ secrets.MAVEN_CENTRAL_GPG_PASSWORD }}
          MAVEN_CENTRAL_GPG_KEY_ID: ${{ secrets.MAVEN_CENTRAL_GPG_KEY_ID }}
        run: |
          set -euo pipefail
          export ORG_GRADLE_PROJECT_mavenCentralUsername="$MAVEN_CENTRAL_USERNAME"
          export ORG_GRADLE_PROJECT_mavenCentralPassword="$MAVEN_CENTRAL_PASSWORD"
          export ORG_GRADLE_PROJECT_signingInMemoryKeyPassword="${MAVEN_CENTRAL_GPG_PASSWORD-}"
          STRIPPED="$(printf '%s\n' "$MAVEN_CENTRAL_GPG_KEY" | grep -v '\-\-' | grep -v '^=.' | tr -d '\n')"
          export ORG_GRADLE_PROJECT_signingInMemoryKey="$STRIPPED"
          if [ -n "${MAVEN_CENTRAL_GPG_KEY_ID:-}" ]; then
            export ORG_GRADLE_PROJECT_signingInMemoryKeyId="$MAVEN_CENTRAL_GPG_KEY_ID"
          fi
          ./gradlew :wireling:publishToMavenCentral --no-daemon

      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [ -z "$PREVIOUS_TAG" ]; then
            echo "No previous tag found, generating changelog from all commits"
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges -n 50)
          else
            echo "Previous tag: $PREVIOUS_TAG"
            COMMITS=$(git log ${PREVIOUS_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          fi
          
          if [ -z "$COMMITS" ]; then
            COMMITS="- Version bump and maintenance updates"
          fi
          
          echo "## What's Changed" > changelog.md
          echo "" >> changelog.md
          echo "$COMMITS" >> changelog.md
          echo "" >> changelog.md
          echo "---" >> changelog.md
          echo "" >> changelog.md
          echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...v${{ steps.new_version.outputs.new_version }}" >> changelog.md
          
          cat changelog.md

      - name: Commit version bump
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add version.properties
          git commit -m "chore: bump version to ${{ steps.new_version.outputs.new_version }}"
          git push

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.new_version.outputs.new_version }}
          name: v${{ steps.new_version.outputs.new_version }}
          body_path: changelog.md
          files: |
            wireling/build/outputs/aar/wireling-release.aar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: v${{ steps.new_version.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Bump Type**: ${{ github.event.inputs.version_bump }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Maven Central**: org.thebytearray.wireling:WireLing:${{ steps.new_version.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
