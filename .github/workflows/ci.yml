name: CI

on:
  push:
    branches: [master, main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    branches: [master, main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build library and sample
        run: ./gradlew :wireling:assembleRelease :app:assembleDebug :wireling:testDebugUnitTest

      - name: Upload library AAR
        uses: actions/upload-artifact@v4
        with:
          name: wireling-release
          path: wireling/build/outputs/aar/wireling-release.aar
          retention-days: 7
